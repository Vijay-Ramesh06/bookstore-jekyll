title: BookStore API Documentation
description: OpenAPI documentation for the BookStore API
baseurl: ""
url: "http://localhost:4000"
theme: minima

collections:
  docs:
    output: true
  docs-v1:
    output: true

defaults:
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "docs"
  - scope:
      path: ""
      type: "docs-v1"
    values:
      layout: "docs"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag